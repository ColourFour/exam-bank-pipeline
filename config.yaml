# Runtime taxonomy and product direction live in src/exam_bank/runtime_profile.json.
# Keep this YAML for operational overrides only.

input:
  question_papers_dir: input/question_papers
  mark_schemes_dir: input/mark_schemes
  mappings_dir: input/mappings

output:
  json_dir: output/json
  debug_dir: output/debug

detection:
  max_question_number: 30
  question_start_max_x: 115
  min_question_start_y: 65
  bottom_margin: 45
  crop_left_margin: 35
  crop_right_margin: 35
  crop_top_margin: 45
  crop_bottom_margin: 40
  crop_padding: 10
  min_text_chars_per_page: 25
  min_question_chars: 20
  render_dpi: 220
  stitch_gap_px: 18
  output_mode: prompt_only
  anchor_min_confidence: 0.58
  anchor_left_tolerance: 12
  anchor_font_size_ratio: 0.85
  anchor_y_tolerance: 8
  span_line_y_tolerance: 6
  continuation_min_text_chars: 8
  prompt_region_max_gap: 60
  prompt_graphic_lookahead: 180
  prompt_graphic_overlap_padding: 24
  min_crop_height: 24
  max_crop_height_ratio: 0.82

ocr:
  enabled: true
  language: eng
  dpi: 220
  min_confidence: 45

naming:
  json_name: question_bank.json

classification:
  enable_openai: false
  openai_model: gpt-5-mini
  openai_timeout_seconds: 30
  uncertainty_threshold: 0.55

debug:
  enabled: false
  save_rendered_pages: true
  save_text_boxes: true
  save_anchor_candidates: true
  save_proposed_boxes: true
  save_crop_boxes: true
